  // ========== PREDICTIONS ==========
  async function loadMatchesAndPredictions() {
    const { data: matches } = await supabase.from('matches').select('*').order('match_datetime', { ascending: true });
    matchesList = (matches||[]).filter(m => isMatchToday(m.match_datetime));
    const { data: predictions } = await supabase.from('predictions').select('*')
      .eq('group_id', currentGroup.id).eq('user_id', currentUser.id);
    predictionsMap.clear();
    predictions.forEach(p => predictionsMap.set(`${p.match_id}:${currentGroup.id}`, p));
    renderPredictionsTab();
  }

  function renderPredictionsTab() {
    const container = document.getElementById("tabPredictions");
    if (!currentGroup?.config) { container.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando…</p></div>`; return; }
    if (!matchesList.length) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-times"></i><p>No hay partidos programados para hoy.</p></div>`;
      return;
    }
    const now           = new Date();
    const minutosLimite = currentGroup.config.minutos_limite_antes || 30;
    container.innerHTML = matchesList.map(match => {
      const status      = getMatchStatus(match, minutosLimite);
      const existingPred = predictionsMap.get(`${match.id}:${currentGroup.id}`);
      const homeVal      = existingPred?.predicted_home ?? '';
      const awayVal      = existingPred?.predicted_away ?? '';
      const statusLabel  = status === 'open' ? 'Abierto' : status === 'locked' ? 'Cerrado' : 'Finalizado';
      return `
        <div class="match-ticket">
          <div class="ticket-header status-${status}">
            <span><span class="status-dot"></span>${statusLabel}</span>
            <span><i class="far fa-clock" style="margin-right:0.3rem;"></i>${formatDateTime(match.match_datetime)}</span>
          </div>
          <div class="ticket-body">
            <div class="teams-row">
              <span class="team-name">${escapeHtml(match.home_team)}</span>
              <span class="vs-badge">VS</span>
              <span class="team-name away">${escapeHtml(match.away_team)}</span>
            </div>
            ${status === 'open' && !existingPred ? `
              <div class="score-input-row">
                <input type="number" id="home_${match.id}" class="score-digit-input" placeholder="0" value="${homeVal}" min="0" max="99">
                <span class="score-dash">—</span>
                <input type="number" id="away_${match.id}" class="score-digit-input" placeholder="0" value="${awayVal}" min="0" max="99">
              </div>
            ` : ''}
            <div style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.35rem;">
              ${existingPred ? `<div class="pred-badge"><i class="fas fa-check-circle"></i> Tu pronóstico: ${homeVal} – ${awayVal}</div>` : ''}
              ${match.result ? `<div class="result-badge"><i class="fas fa-futbol"></i> Resultado: ${match.result.home} – ${match.result.away}</div>` : ''}
              ${status === 'locked' && !existingPred ? `<div class="no-pred-banner"><i class="fas fa-times-circle"></i> Sin pronóstico</div>` : ''}
              ${status === 'locked' ? `<div class="locked-banner"><i class="fas fa-lock"></i> Tiempo límite pasado</div>` : ''}
              ${existingPred?.points_earned != null ? `<div class="points-badge"><i class="fas fa-star"></i> ${existingPred.points_earned} pts</div>` : ''}
            </div>
          </div>
          ${status === 'open' && !existingPred ? `
            <div class="ticket-footer">
              <button data-match="${match.id}" class="savePredictionBtn btn btn-gold btn-sm">
                <i class="fas fa-save"></i> Guardar pronóstico
              </button>
            </div>
          ` : ''}
        </div>
      `;
    }).join('');

    document.querySelectorAll('.savePredictionBtn').forEach(btn => {
      btn.onclick = async () => {
        const matchId = btn.getAttribute('data-match');
        const match   = matchesList.find(m => m.id === matchId);
        if (!match) return;
        if (isMatchLocked(match.match_datetime, currentGroup.config.minutos_limite_antes||30)) {
          showModal("Tiempo agotado", "El límite para pronosticar ya expiró.", true);
          await loadMatchesAndPredictions(); return;
        }
        const home = parseInt(document.getElementById(`home_${matchId}`).value);
        const away = parseInt(document.getElementById(`away_${matchId}`).value);
        if (isNaN(home)||isNaN(away)) { showModal("Error", "Ingresá números válidos.", true); return; }
        const existing = predictionsMap.get(`${matchId}:${currentGroup.id}`);
        if (existing) {
          await supabase.from('predictions').update({ predicted_home: home, predicted_away: away }).eq('id', existing.id);
        } else {
          await supabase.from('predictions').insert({
            match_id: matchId, user_id: currentUser.id, group_id: currentGroup.id,
            predicted_home: home, predicted_away: away
          });
        }
        showModal("¡Listo!", "Tu pronóstico fue guardado.");
        await loadMatchesAndPredictions();
      };
    });
  }

  // ========== NUEVA FUNCIÓN: CARGAR PREDICCIONES DE TODOS LOS MIEMBROS ==========
  async function loadAllPredictions() {
    const container = document.getElementById("tabAllpredictions");
    if (!currentGroup?.config) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando…</p></div>`;
      return;
    }
    if (!matchesList.length) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-times"></i><p>No hay partidos programados para hoy.</p></div>`;
      return;
    }

    const { data: members } = await supabase
      .from('group_members')
      .select('user_id')
      .eq('group_id', currentGroup.id);
    if (!members?.length) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>No hay miembros en el grupo.</p></div>`;
      return;
    }

    const userIds = members.map(m => m.user_id);
    const { data: profiles } = await supabase
      .from('profiles')
      .select('id, username')
      .in('id', userIds);
    const userMap = new Map(profiles?.map(p => [p.id, p.username]) || []);

    const matchIds = matchesList.map(m => m.id);
    const { data: allPredictions } = await supabase
      .from('predictions')
      .select('*')
      .eq('group_id', currentGroup.id)
      .in('match_id', matchIds);

    const predByMatch = new Map();
    matchesList.forEach(m => predByMatch.set(m.id, new Map()));
    allPredictions?.forEach(p => {
      const matchMap = predByMatch.get(p.match_id);
      if (matchMap) matchMap.set(p.user_id, p);
    });

    const minutosLimite = currentGroup.config.minutos_limite_antes || 30;

    container.innerHTML = matchesList.map(match => {
      const status = getMatchStatus(match, minutosLimite);
      const statusLabel = status === 'open' ? 'Abierto' : status === 'locked' ? 'Cerrado' : 'Finalizado';

      if (status === 'open') {
        return `
          <div class="match-ticket">
            <div class="ticket-header status-open">
              <span><span class="status-dot"></span>${statusLabel}</span>
              <span><i class="far fa-clock" style="margin-right:0.3rem;"></i>${formatDateTime(match.match_datetime)}</span>
            </div>
            <div class="ticket-body">
              <div class="teams-row">
                <span class="team-name">${escapeHtml(match.home_team)}</span>
                <span class="vs-badge">VS</span>
                <span class="team-name away">${escapeHtml(match.away_team)}</span>
              </div>
              <div class="locked-banner" style="margin-top:0.5rem;">
                <i class="fas fa-eye-slash"></i> Los pronósticos se mostrarán cuando el partido esté cerrado
              </div>
            </div>
          </div>
        `;
      }

      const matchPredictions = predByMatch.get(match.id) || new Map();
      return `
        <div class="match-ticket">
          <div class="ticket-header status-${status}">
            <span><span class="status-dot"></span>${statusLabel}</span>
            <span><i class="far fa-clock" style="margin-right:0.3rem;"></i>${formatDateTime(match.match_datetime)}</span>
          </div>
          <div class="ticket-body">
            <div class="teams-row">
              <span class="team-name">${escapeHtml(match.home_team)}</span>
              <span class="vs-badge">VS</span>
              <span class="team-name away">${escapeHtml(match.away_team)}</span>
            </div>
            <table class="all-predictions-table">
              <thead>
                <tr>
                  <th>Jugador</th>
                  <th style="text-align:center;">Local</th>
                  <th style="text-align:center;">Visitante</th>
                </tr>
              </thead>
              <tbody>
                ${userIds.map(uid => {
                  const pred = matchPredictions.get(uid);
                  const username = userMap.get(uid) || uid;
                  const isYou = uid === currentUser.id;
                  const crown = uid === currentGroup.created_by ? ' <i class="fas fa-crown" style="color:var(--gold); font-size:0.7rem;"></i>' : '';
                  if (pred) {
                    return `
                      <tr>
                        <td>${escapeHtml(username)}${crown} ${isYou ? '<span style="background:var(--gold-light);color:#78350f;font-size:0.65rem;padding:0.1rem 0.4rem;border-radius:100px;margin-left:0.3rem;font-weight:600;">Tú</span>' : ''}</td>
                        <td style="text-align:center; font-weight:600;">${pred.predicted_home}</td>
                        <td style="text-align:center; font-weight:600;">${pred.predicted_away}</td>
                      </tr>
                    `;
                  } else {
                    return `
                      <tr>
                        <td>${escapeHtml(username)}${crown} ${isYou ? '<span style="background:var(--gold-light);color:#78350f;font-size:0.65rem;padding:0.1rem 0.4rem;border-radius:100px;margin-left:0.3rem;font-weight:600;">Tú</span>' : ''}</td>
                        <td colspan="2" style="text-align:center; color:var(--slate-light); font-style:italic;">Sin pronóstico</td>
                      </tr>
                    `;
                  }
                }).join('')}
              </tbody>
            </table>
            ${match.result ? `<div class="result-badge" style="margin-top:0.5rem;"><i class="fas fa-futbol"></i> Resultado oficial: ${match.result.home} – ${match.result.away}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // ========== HISTORY ==========
  async function loadHistory() {
    const { data: allMatches } = await supabase.from('matches').select('*').order('match_datetime', { ascending: false });
    const oldMatches = (allMatches||[]).filter(m => !isMatchToday(m.match_datetime) && new Date(m.match_datetime) < new Date());
    const container = document.getElementById("tabHistory");
    if (!oldMatches.length) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-history"></i><p>No hay partidos anteriores.</p></div>`;
      return;
    }
    const { data: predictions } = await supabase.from('predictions').select('*').eq('group_id', currentGroup.id).eq('user_id', currentUser.id);
    const predMap = new Map();
    predictions?.forEach(p => predMap.set(p.match_id, p));
    container.innerHTML = oldMatches.map(match => {
      const pred = predMap.get(match.id);
      return `
        <div class="history-card">
          <div class="match-title">${escapeHtml(match.home_team)} <span style="color:var(--slate-light);font-weight:400;">vs</span> ${escapeHtml(match.away_team)}</div>
          <div class="date-label"><i class="far fa-calendar-alt"></i> ${formatDateTime(match.match_datetime)}</div>
          <div style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.4rem; grid-column:1/-1;">
            ${match.result ? `<div class="result-badge"><i class="fas fa-futbol"></i> ${match.result.home} – ${match.result.away}</div>` : '<span style="font-size:0.8rem;color:var(--slate-light);">Resultado pendiente</span>'}
            ${pred ? `<div class="pred-badge"><i class="fas fa-check-circle"></i> Tu pronóstico: ${pred.predicted_home} – ${pred.predicted_away}</div>` : '<div class="no-pred-banner"><i class="fas fa-minus-circle"></i> Sin pronóstico</div>'}
            ${pred?.points_earned != null ? `<div class="points-badge"><i class="fas fa-star"></i> ${pred.points_earned} pts</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // ========== RANKING ==========
  async function loadRanking() {
    const { data: members } = await supabase.from('group_members').select('user_id').eq('group_id', currentGroup.id);
    const container = document.getElementById("tabRanking");
    if (!members?.length) { container.innerHTML = `<div class="empty-state"><i class="fas fa-trophy"></i><p>No hay miembros.</p></div>`; return; }
    const userIds = members.map(m => m.user_id);
    const { data: predictionsAll } = await supabase.from('predictions').select('user_id, points_earned').in('user_id', userIds).eq('group_id', currentGroup.id);
    const pointsMap = new Map();
    predictionsAll?.forEach(p => pointsMap.set(p.user_id, (pointsMap.get(p.user_id)||0) + (p.points_earned||0)));
    const { data: profiles } = await supabase.from('profiles').select('id, username').in('id', userIds);
    const ranking = userIds.map(uid => {
      const profile = profiles?.find(p => p.id === uid);
      return { uid, username: profile?.username || uid, points: pointsMap.get(uid)||0 };
    }).sort((a,b) => b.points - a.points);
    const posClass = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const posIcon  = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const fondo    = currentGroup.fondo_comun_total||0;
    const porc     = currentGroup.config.porcentajes_premios;
    container.innerHTML = `
      <div class="ranking-wrap">
        <table class="ranking-table">
          <thead><tr><th>#</th><th>Jugador</th><th>Puntos</th></tr></thead>
          <tbody>
            ${ranking.map((u,i) => `
              <tr>
                <td><span class="rank-pos ${posClass(i)}">${posIcon(i)||i+1}</span></td>
                <td>
                  ${escapeHtml(u.username)}
                  ${u.uid === currentGroup.created_by ? '<i class="fas fa-crown crown-icon" title="Creador"></i>' : ''}
                  ${u.uid === currentUser.id ? '<span style="background:var(--gold-light);color:#78350f;font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:100px;margin-left:0.3rem;font-weight:600;">Tú</span>' : ''}
                </td>
                <td class="pts-cell">${u.points}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="prize-card">
        <div class="prize-item"><div class="pos">🥇 1er lugar</div><div class="amount">Bs. ${(fondo*(porc['1']||0)/100).toFixed(2)}</div><div class="pct">${porc['1']}% del fondo</div></div>
        <div class="prize-item"><div class="pos">🥈 2do lugar</div><div class="amount">Bs. ${(fondo*(porc['2']||0)/100).toFixed(2)}</div><div class="pct">${porc['2']}% del fondo</div></div>
        <div class="prize-item"><div class="pos">🥉 3er lugar</div><div class="amount">Bs. ${(fondo*(porc['3']||0)/100).toFixed(2)}</div><div class="pct">${porc['3']}% del fondo</div></div>
        <div class="prize-item"><div class="pos">🏅 4to lugar</div><div class="amount">Bs. ${(fondo*(porc['4']||0)/100).toFixed(2)}</div><div class="pct">${porc['4']}% del fondo</div></div>
        <div class="prize-total">Fondo total acumulado: <strong>Bs. ${fondo.toFixed(2)}</strong></div>
      </div>
    `;
  }

  // ========== CHAT ==========
  async function setupChat() {
    if (chatSubscription) await chatSubscription.unsubscribe();
    await loadChatMessages();
    chatSubscription = supabase.channel(`chat_${currentGroup.id}`)
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'chat_messages', filter:`group_id=eq.${currentGroup.id}` }, async payload => {
        const { data: profile } = await supabase.from('profiles').select('username').eq('id', payload.new.user_id).single();
        appendMessage({ ...payload.new, username: profile?.username });
      })
      .subscribe();
  }
  async function loadChatMessages() {
    const { data } = await supabase.from('chat_messages').select('*, user_id').eq('group_id', currentGroup.id).order('created_at', { ascending: true }).limit(100);
    if (!data) return;
    const userIds = [...new Set(data.map(m => m.user_id))];
    const { data: profiles } = await supabase.from('profiles').select('id, username').in('id', userIds);
    const userMap = new Map();
    profiles?.forEach(p => userMap.set(p.id, p.username));
    const container = document.getElementById("chatMessages");
    container.innerHTML = '';
    data.forEach(msg => appendMessage({ ...msg, username: userMap.get(msg.user_id)||msg.user_id }));
  }
  function appendMessage(msg) {
    const container = document.getElementById("chatMessages");
    const div = document.createElement('div');
    div.className = 'message' + (msg.user_id === currentUser?.id ? ' own' : '');
    const isCreator = currentGroup?.created_by === msg.user_id;
    div.innerHTML = `<strong>${escapeHtml(msg.username)} ${isCreator ? '<i class="fas fa-crown" style="color:var(--gold);font-size:0.75rem;"></i>' : ''}</strong><small>${new Date(msg.created_at).toLocaleTimeString('es-BO', { timeZone: 'America/La_Paz' })}</small><br>${escapeHtml(msg.message)}`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }
  document.getElementById("sendChatBtn").onclick = async () => {
    const input = document.getElementById("chatInput");
    if (!input.value.trim()) return;
    await supabase.from('chat_messages').insert({ group_id: currentGroup.id, user_id: currentUser.id, message: input.value });
    input.value = '';
  };

  // ========== ADMIN ==========
  async function loadAdminTab() {
    if (currentGroup.created_by !== currentUser.id) return;
    const container = document.getElementById("tabAdmin");
    const { data: matches } = await supabase.from('matches').select('*').order('match_datetime');
    const sorted = [...(matches||[])].sort((a,b) => {
      const af = a.result && a.status==='finished';
      const bf = b.result && b.status==='finished';
      if (af===bf) return 0;
      return af ? 1 : -1;
    });
    container.innerHTML = `
      <div class="admin-card">
        <h3><i class="fas fa-plus-circle"></i> Agregar partido</h3>
        <div class="form-grid">
          <input type="text" id="newHomeTeam" placeholder="Equipo local">
          <input type="text" id="newAwayTeam" placeholder="Equipo visitante">
          <input type="datetime-local" id="newMatchDatetime">
          <button id="addMatchBtn" class="btn btn-primary btn-sm" style="align-self:flex-start">Crear partido</button>
        </div>
      </div>
      <div class="admin-card">
        <h3><i class="fas fa-flag-checkered"></i> Cargar resultados</h3>
        ${sorted.map(match => `
          <div style="padding:0.75rem 0; border-bottom:1px solid var(--cream-dark);">
            <div style="font-family:var(--font-display); font-size:0.875rem; font-weight:600; color:var(--slate); margin-bottom:0.5rem;">
              ${escapeHtml(match.home_team)} <span style="color:var(--slate-light); font-weight:400;">vs</span> ${escapeHtml(match.away_team)}
              <span style="font-size:0.72rem; color:var(--slate-light); font-weight:400; margin-left:0.5rem;">${formatDateTime(match.match_datetime)}</span>
            </div>
            <div class="result-row">
              <input type="number" id="res_home_${match.id}" class="score-digit-input" placeholder="0" value="${match.result?.home??''}">
              <span class="score-dash">—</span>
              <input type="number" id="res_away_${match.id}" class="score-digit-input" placeholder="0" value="${match.result?.away??''}">
              <button data-match="${match.id}" class="saveResultBtn btn btn-primary btn-sm">
                <i class="fas fa-check"></i> Guardar
              </button>
              ${match.result && match.status==='finished'
                ? `<span style="font-size:0.75rem; color:#10b981; font-weight:600; display:flex; align-items:center; gap:0.3rem;"><i class="fas fa-check-circle"></i> Finalizado</span>`
                : `<span style="font-size:0.75rem; color:var(--slate-light);">Pendiente</span>`}
            </div>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById("addMatchBtn")?.addEventListener('click', async () => {
      const home     = document.getElementById("newHomeTeam").value.trim();
      const away     = document.getElementById("newAwayTeam").value.trim();
      const datetime = document.getElementById("newMatchDatetime").value;
      if (!home||!away||!datetime) { showModal("Error", "Completá todos los campos.", true); return; }
      const local  = new Date(datetime);
      const utc    = new Date(local.getTime() - local.getTimezoneOffset()*60000);
      const { error } = await supabase.from('matches').insert({ home_team: home, away_team: away, match_datetime: utc.toISOString() });
      if (error) showModal("Error", error.message, true);
      else { showModal("¡Partido creado!", `${home} vs ${away} agregado.`); loadAdminTab(); loadMatchesAndPredictions(); loadHistory(); }
    });

    // ===== BOTÓN GUARDAR RESULTADO (CON CÁLCULO DE PUNTOS) =====
    document.querySelectorAll('.saveResultBtn').forEach(btn => {
                btn.onclick = async () => {
                    const matchId = btn.getAttribute('data-match');
                    const resHome = parseInt(document.getElementById(`res_home_${matchId}`).value);
                    const resAway = parseInt(document.getElementById(`res_away_${matchId}`).value);
                    if (isNaN(resHome) || isNaN(resAway)) {
                        showModal("Error", "Ingresa numeros validos.", true);
                        return;
                    }

                    // 1. Guardar resultado
                    const {error: matchError} = await supabase
                        .from('matches')
                        .update({result: {home: resHome, away: resAway}, status: 'finished'})
                        .eq('id', matchId);
                    if (matchError) {
                        showModal("Error", matchError.message, true);
                        return;
                    }

                    // 2. Obtener predicciones de este partido en este grupo
                    const {data: preds, error: predsError} = await supabase
                        .from('predictions')
                        .select('id, predicted_home, predicted_away')
                        .eq('match_id', matchId)
                        .eq('group_id', currentGroup.id);
                    if (predsError) {
                        showModal("Error al leer pronosticos", predsError.message, true);
                        return;
                    }

                    if (!preds || preds.length === 0) {
                        showModal("Resultado guardado", "No habia pronosticos para este partido.");
                        loadAdminTab();
                        loadRanking();
                        loadMatchesAndPredictions();
                        loadHistory();
                        loadAllPredictions();
                        return;
                    }

                    // 3. Calcular y asignar puntos
                    const config = currentGroup.config;
                    const pGanador = config.puntos_ganador || 0;
                    const pEmpate = config.puntos_empate || 0;
                    const pExacto = config.puntos_marcador_exacto || 0;

                    // Signo del resultado real: 1=local gana, -1=visita gana, 0=empate
                    const signoReal = resHome > resAway ? 1 : resHome < resAway ? -1 : 0;

                    let errCount = 0;
                    for (const pred of preds) {
                        const pH = pred.predicted_home;
                        const pA = pred.predicted_away;
                        let points = 0;

                        if (pH === resHome && pA === resAway) {
                            // Marcador exacto
                            points = pExacto;
                        } else {
                            const signoPred = pH > pA ? 1 : pH < pA ? -1 : 0;
                            if (signoPred === signoReal) {
                                // Acerto el signo pero no el marcador exacto:
                                // Si ambos son empate -> puntos de empate
                                // Si acerto quien gana -> puntos de ganador
                                points = (signoReal === 0) ? pEmpate : pGanador;
                            }
                            // No acerto el signo -> 0 puntos
                        }

                        const {error: upErr} = await supabase
                            .from('predictions')
                            .update({points_earned: points})
                            .eq('id', pred.id);
                        if (upErr) errCount++;
                    }

                    if (errCount > 0) {
                        showModal("Advertencia", `Resultado guardado pero ${errCount} pronostico(s) no pudieron actualizarse.`, true);
                    } else {
                        showModal("Listo!", `Resultado ${resHome}-${resAway} guardado. ${preds.length} pronostico(s) puntuados.`);
                    }
                    loadAdminTab();
                    loadRanking();
                    loadMatchesAndPredictions();
                    loadHistory();
                    loadAllPredictions();
                };
            });
        }

  // ========== SETTINGS ==========
  async function loadSettingsTab() {
    const isCreator = currentGroup.created_by === currentUser.id;
    const container = document.getElementById("tabSettings");
    const { data: transactions } = await supabase.from('fund_transactions').select('*, profiles(username)').eq('group_id', currentGroup.id).order('created_at', { ascending: false });
    const config = currentGroup.config;
    container.innerHTML = `
      <div class="settings-section">
        <h3><i class="fas fa-info-circle"></i> Configuración del grupo</h3>
        <div class="config-row"><label>ID del grupo</label><div class="id-chip" id="copyIdSettings" style="cursor:pointer"><i class="fas fa-fingerprint"></i>${currentGroup.id.slice(0,14)}…<i class="fas fa-copy"></i></div></div>
        <div class="config-row"><label>Tipo de pronóstico</label><strong>${config.tipo_pronostico}</strong></div>
        <div class="config-row"><label>Puntos — Ganador / Empate / Exacto</label><strong>${config.puntos_ganador} / ${config.puntos_empate} / ${config.puntos_marcador_exacto}</strong></div>
        <div class="config-row"><label>Minutos límite antes del partido</label><strong>${config.minutos_limite_antes} min</strong></div>
        <div class="config-row"><label>Porcentajes de premios</label><strong>1°=${config.porcentajes_premios['1']}% · 2°=${config.porcentajes_premios['2']}% · 3°=${config.porcentajes_premios['3']}% · 4°=${config.porcentajes_premios['4']}%</strong></div>
        ${isCreator ? `
          <div class="divider"></div>
          <h4 style="font-family:var(--font-display); font-size:0.875rem; font-weight:700; color:var(--slate); margin-bottom:0.75rem; display:flex; align-items:center; gap:0.4rem;"><i class="fas fa-edit" style="color:var(--green-bright)"></i> Editar reglas</h4>
          <div class="edit-grid">
            <label>Puntos por ganador</label><input type="number" id="editPuntosGanador" value="${config.puntos_ganador}">
            <label>Puntos por empate</label><input type="number" id="editPuntosEmpate" value="${config.puntos_empate}">
            <label>Puntos por marcador exacto</label><input type="number" id="editPuntosExacto" value="${config.puntos_marcador_exacto}">
            <label>Minutos límite</label><input type="number" id="editMinutosLimite" value="${config.minutos_limite_antes}">
            <label>% 1er lugar</label><input type="number" id="editPorc1" value="${config.porcentajes_premios['1']}">
            <label>% 2do lugar</label><input type="number" id="editPorc2" value="${config.porcentajes_premios['2']}">
            <label>% 3er lugar</label><input type="number" id="editPorc3" value="${config.porcentajes_premios['3']}">
            <label>% 4to lugar</label><input type="number" id="editPorc4" value="${config.porcentajes_premios['4']}">
          </div>
          <button id="saveRulesBtn" class="btn btn-primary btn-sm" style="margin-top:0.9rem"><i class="fas fa-save"></i> Guardar cambios</button>
        ` : ''}
      </div>
      <div class="fund-total-row">
        <span>Fondo común acumulado</span>
        <strong>Bs. ${(currentGroup.fondo_comun_total||0).toFixed(2)}</strong>
      </div>
      <div class="settings-section">
        <h3><i class="fas fa-coins"></i> Fondo común</h3>
        ${isCreator ? `
          <div style="display:flex; flex-direction:column; gap:0.6rem; margin-bottom:1rem;">
            <input type="text" id="depositorName" placeholder="Nombre del depositante">
            <div style="display:flex; gap:0.6rem; align-items:center;">
              <input type="number" id="addAmount" placeholder="Monto (Bs.)" step="0.01" style="flex:1;">
              <button id="addFundBtn" class="btn btn-gold btn-sm"><i class="fas fa-plus"></i> Agregar</button>
            </div>
          </div>
        ` : '<p style="font-size:0.85rem; color:var(--slate-light); margin-bottom:0.75rem;"><i class="fas fa-lock"></i> Solo el creador puede registrar depósitos.</p>'}
        ${transactions?.length ? `
          <div style="overflow-x:auto; border-radius:var(--radius-sm); border:1px solid var(--border);">
            <table class="fund-table">
              <thead><tr><th>Fecha</th><th>Depositante</th><th>Monto</th><th>Registrado por</th></tr></thead>
              <tbody>
                ${transactions.map(t => `
                  <tr>
                    <td>${new Date(t.created_at).toLocaleString('es-BO', { timeZone:'America/La_Paz' })}</td>
                    <td>${escapeHtml(t.description?.replace('Depósito de: ','')||'Anónimo')}</td>
                    <td style="font-weight:600; color:var(--green-deep);">Bs. ${t.amount.toFixed(2)}</td>
                    <td>${escapeHtml(t.profiles?.username||t.user_id)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        ` : '<p style="font-size:0.85rem; color:var(--slate-light);">No hay depósitos registrados.</p>'}
      </div>

      <!-- NUEVO BOTÓN PARA EXPORTAR CSV -->
      <div class="settings-section" style="margin-top:1rem;">
        <h3><i class="fas fa-download"></i> Respaldo y transparencia</h3>
        <p style="font-size:0.85rem; color:var(--slate-light); margin-bottom:0.75rem;">
          Descarga un archivo CSV con todos los pronósticos y puntos del grupo.
        </p>
        <button id="downloadCsvBtn" class="btn btn-primary btn-sm">
          <i class="fas fa-file-csv"></i> Descargar CSV
        </button>
      </div>
    `;

    document.getElementById("copyIdSettings")?.addEventListener('click', () => {
      navigator.clipboard.writeText(currentGroup.id);
      showModal("Copiado", "ID copiado al portapapeles.");
    });

    if (isCreator) {
      document.getElementById("saveRulesBtn")?.addEventListener('click', async () => {
        const g  = v => parseInt(document.getElementById(v).value);
        const pg = g("editPuntosGanador"), pe = g("editPuntosEmpate"), pex = g("editPuntosExacto"), ml = g("editMinutosLimite");
        const p1 = g("editPorc1"), p2 = g("editPorc2"), p3 = g("editPorc3"), p4 = g("editPorc4");
        if ([pg,pe,pex,ml].some(isNaN)) { showModal("Error", "Los puntos deben ser números.", true); return; }
        if (p1+p2+p3+p4 !== 100)        { showModal("Error", "Los porcentajes deben sumar 100%.", true); return; }
        const newConfig = { ...currentGroup.config, puntos_ganador:pg, puntos_empate:pe, puntos_marcador_exacto:pex, minutos_limite_antes:ml, porcentajes_premios:{"1":p1,"2":p2,"3":p3,"4":p4} };
        const { error } = await supabase.from('groups').update({ config: newConfig }).eq('id', currentGroup.id);
        if (error) showModal("Error", error.message, true);
        else { currentGroup.config = newConfig; showModal("¡Guardado!", "Reglas actualizadas."); loadSettingsTab(); loadRanking(); loadMatchesAndPredictions(); }
      });
      document.getElementById("addFundBtn")?.addEventListener('click', async () => {
        const amount    = parseFloat(document.getElementById("addAmount").value);
        const depositor = document.getElementById("depositorName").value.trim();
        if (isNaN(amount)||amount<=0) { showModal("Error", "Monto inválido.", true); return; }
        if (!depositor)               { showModal("Error", "Ingresá el nombre del depositante.", true); return; }
        const { error } = await supabase.from('fund_transactions').insert({ group_id: currentGroup.id, user_id: currentUser.id, amount, description: `Depósito de: ${depositor}` });
        if (error) showModal("Error", error.message, true);
        else {
          const newTotal = (currentGroup.fondo_comun_total||0) + amount;
          await supabase.from('groups').update({ fondo_comun_total: newTotal }).eq('id', currentGroup.id);
          currentGroup.fondo_comun_total = newTotal;
          document.getElementById("addAmount").value = '';
          document.getElementById("depositorName").value = '';
          loadSettingsTab(); loadRanking();
          showModal("¡Depósito registrado!", `Bs. ${amount.toFixed(2)} agregados. Depositante: ${depositor}`);
        }
      });
    }

    // Listener para el botón de descarga CSV
    document.getElementById("downloadCsvBtn")?.addEventListener('click', downloadCSV);
  }

  // ========== NAV ==========
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    const tid = `tab${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`;
    document.getElementById(tid)?.classList.remove('hidden');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const activeEl = Array.from(document.querySelectorAll('.tab')).find(t => t.getAttribute('data-tab') === tabId);
    if (activeEl) activeEl.classList.add('active');
    if (tabId === 'ranking')  loadRanking();
    if (tabId === 'history')  loadHistory();
    if (tabId === 'chat')     loadChatMessages();
    if (tabId === 'admin'  && currentGroup?.created_by === currentUser?.id) loadAdminTab();
    if (tabId === 'settings') loadSettingsTab();
    if (tabId === 'allpredictions') loadAllPredictions();
  }
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => switchTab(tab.getAttribute('data-tab'));
  });

  // ========== EXPORTACIÓN CSV ==========
  async function downloadCSV() {
    if (!currentGroup) {
      showModal("Error", "No hay grupo seleccionado.", true);
      return;
    }
    showModal("Generando CSV", "Espera un momento mientras se prepara el archivo...");

    // 1. Obtener todas las predicciones del grupo
    const { data: predictions } = await supabase
      .from('predictions')
      .select('*')
      .eq('group_id', currentGroup.id);

    if (!predictions || predictions.length === 0) {
      showModal("Sin datos", "No hay pronósticos en este grupo para exportar.", true);
      return;
    }

    // 2. Obtener todos los partidos involucrados
    const matchIds = [...new Set(predictions.map(p => p.match_id))];
    const { data: matches } = await supabase
      .from('matches')
      .select('*')
      .in('id', matchIds);

    // Mapa de partidos
    const matchMap = new Map(matches?.map(m => [m.id, m]) || []);

    // 3. Obtener perfiles de los usuarios
    const userIds = [...new Set(predictions.map(p => p.user_id))];
    const { data: profiles } = await supabase
      .from('profiles')
      .select('id, username')
      .in('id', userIds);
    const userMap = new Map(profiles?.map(p => [p.id, p.username]) || []);

    // 4. Construir el contenido CSV
    const BOM = '\uFEFF';  // Marca BOM para que Excel reconozca UTF-8
    const header = 'Partido,Fecha,Resultado,Jugador,Pronóstico Local,Pronóstico Visitante,Puntos';
    const rows = predictions.map(p => {
      const match = matchMap.get(p.match_id);
      const matchName = match ? `${match.home_team} vs ${match.away_team}` : 'Desconocido';
      const date = match ? formatDateTime(match.match_datetime) : '';
      const result = match?.result ? `${match.result.home}-${match.result.away}` : 'Pendiente';
      const username = userMap.get(p.user_id) || p.user_id;
      const local = p.predicted_home;
      const visit = p.predicted_away;
      const points = p.points_earned ?? '';
      return `"${matchName}","${date}","${result}","${username}",${local},${visit},${points}`;
    });

    const csvContent = BOM + header + '\n' + rows.join('\n');

    // 5. Descargar el archivo
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.setAttribute('download', `backup_${currentGroup.name.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);

    showModal("¡Descarga lista!", "El archivo CSV se ha descargado correctamente.");
  }

  // ========== BOOT ==========
  loadUser();
})();
</script>
